services:
  - type: web
    name: meetingmind-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: AI_MODEL_POOL
        value: openai:gpt-4.1-mini,groq:llama-3.1-70b-versatile,gemini:gemini-2.5-flash,mistral:mistral-large-latest
      - key: GOOGLE_API_KEY
        value:
      - key: OPENAI_API_KEY
        value:
      - key: GROQ_API_KEY
        value:
      - key: MISTRAL_API_KEY
        value:
